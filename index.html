<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LinkLib - Your Link Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root">
    <!-- Landing / Login Screen -->
    <div id="login-screen" class="screen hero">
      <div class="hero-inner">
        <h1>LinkLib - Your Link Library</h1>
        
        <div class="auth-card">
          <div class="tabs">
            <button class="tab active" id="tab-login" type="button">Login</button>
            <button class="tab" id="tab-register" type="button">Register</button>
          </div>
          
          <form id="login-form" class="auth-form">
            <input id="login-email" type="email" placeholder="E-Mail" required />
            <input id="login-password" type="password" placeholder="Passwort" required />
            <button type="submit" class="primary" id="auth-submit-btn">Bestätigen</button>
          </form>
        </div>
      </div>
    </div>

    <!-- App Screen -->
    <div id="app-screen" class="screen hidden">
      <header class="app-header">
        <div class="brand">
          <h2>LinkLib</h2>
        </div>
        <div class="user-actions">
          <span id="user-email"></span>
          <button id="logout-btn" class="secondary">Logout</button>
        </div>
      </header>

      <main class="app-main">
        <div class="app-top">
          <button id="new-section-btn" class="primary">＋ Neue Sektion</button>
        </div>

        <!-- Sections wrapper -->
        <div id="sections"></div>
      </main>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
